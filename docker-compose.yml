version: '3.8'

services:
  # Next.js Web App with reverse proxy
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    networks:
      - socos-network

  # NestJS API
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - PORT=3001
    networks:
      - socos-network
    depends_on:
      - db

  # React Platform
  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
    networks:
      - socos-network

  # Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=socos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - socos-network

networks:
  socos-network:
    driver: bridge

volumes:
  postgres-data: