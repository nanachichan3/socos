version: '3.8'

services:
  # Reverse proxy + Web app (Next.js handles routing)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - socos-network

  # NestJS API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@socos-db:5432/socos
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - socos-network
    depends_on:
      - db

  # React Platform (folder named 'mobile' in repo)
  platform:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    networks:
      - socos-network

  # Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=socos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - socos-network

networks:
  socos-network:
    driver: bridge

volumes:
  postgres-data: