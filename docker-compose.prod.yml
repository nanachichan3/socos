version: '3.8'

services:
  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
      - PLATFORM_INTERNAL_URL=http://platform:8080
    depends_on:
      api:
        condition: service_started
    networks:
      - frontend
      - backend
      - coolify
    restart: unless-stopped

  # NestJS API
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-3010}:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:socos-db-pass-2026@db:5432/socos
      - JWT_SECRET=socos-dev-secret-2026
      - PORT=3001
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=socos-db-pass-2026
      - POSTGRES_DB=socos
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/check || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # React Platform (static SPA)
  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://socos.rachkovan.com}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    networks:
      - frontend
      - coolify
    restart: unless-stopped

  # PostgreSQL Database (local)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=socos-db-pass-2026
      - POSTGRES_DB=socos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  frontend:
  backend:
  coolify:
    external: true
    name: coolify
