version: '3.8'

services:
  # Nginx reverse proxy - single entry point for all services
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PROXY_PORT:-3000}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - platform
    networks:
      - p048s08k44sgg0gcw0cwssg4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
      - PLATFORM_INTERNAL_URL=http://platform:8080
    expose:
      - "3000"
    networks:
      - p048s08k44sgg0gcw0cwssg4
    restart: unless-stopped

  # NestJS API
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NODE_TLS_REJECT_UNAUTHORIZED=1
      - JWT_SECRET=${JWT_SECRET:-socos-dev-secret-2026}
      - PORT=3001
    expose:
      - "3001"
    networks:
      - p048s08k44sgg0gcw0cwssg4
    restart: unless-stopped

  # React Platform - static SPA served by nginx
  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-}
    expose:
      - "8080"
    networks:
      - p048s08k44sgg0gcw0cwssg4
    restart: unless-stopped

networks:
  p048s08k44sgg0gcw0cwssg4:
    name: p048s08k44sgg0gcw0cwssg4
    external: true