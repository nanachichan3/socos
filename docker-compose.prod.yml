version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
      - PLATFORM_INTERNAL_URL=http://platform:8080
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - default
      - coolify

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3010:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:socos-db-pass-2026@db:5432/socos
      - JWT_SECRET=socos-dev-secret-2026
      - PORT=3001
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=socos-db-pass-2026
      - POSTGRES_DB=socos
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/check || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - default
      - coolify

  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://socos.rachkovan.com}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    restart: unless-stopped
    networks:
      - default
      - coolify

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=socos-db-pass-2026
      - POSTGRES_DB=socos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - default

networks:
  coolify:
    external: true
