version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://socos.rachkovan.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - API_INTERNAL_URL=http://api:3001
      - PLATFORM_INTERNAL_URL=http://platform:8080
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.socos.rule=Host(`socos.rachkovan.com`)"
      - "traefik.http.routers.socos.entrypoints=websecure"
      - "traefik.http.routers.socos.tls=true"
      - "traefik.http.services.socos.loadbalancer.server.port=80"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3010:3001"
    environment:
      - NODE_ENV=production
      # Use PostgreSQL internal hostname on coolify network
      - DATABASE_URL=postgresql://postgres:uxMw0dyEf1ugsuBgYv0TMxI40BN0K79BzOwYtBIj7R8TFwe36WXQDZzFJWvA317u@d48ck8o0488cc4skc4k8os0s:5432/socos?sslmode=allow
      - JWT_SECRET=socos-dev-secret-2026
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/check || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - coolify

  platform:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://socos.rachkovan.com}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://socos.rachkovan.com}
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
